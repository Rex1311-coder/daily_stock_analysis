name: Daily Stock Analysis

on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean
      stocks:
        description: '指定股票代码（逗号分隔）'
        required: false
        type: string

env:
  GITHUB_ACTIONS: true
  USE_PROXY: false
  PYTHON_VERSION: '3.11'

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt --no-cache-dir
          fi

      - name: Create directories
        run: |
          mkdir -p data logs reports cache

      - name: Run stock analysis
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          python main.py ${{ github.event.inputs.force_run == 'true' && '--force-run' || '' }} \
                         ${{ github.event.inputs.stocks != '' && format('--stocks {0}', github.event.inputs.stocks) || '' }} \
                         --no-context-snapshot

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-results-${{ github.run_id }}
          path: |
            data/*.csv
            logs/*.log
            reports/*.md
          retention-days: 7
